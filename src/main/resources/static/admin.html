<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Админ панель — Coffee Manager</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .tabs { display:flex; gap:2px; margin-bottom:28px; }
        .tab {
            padding:9px 20px; font-family:'DM Mono',monospace; font-size:11px;
            letter-spacing:.12em; text-transform:uppercase; cursor:pointer;
            border:1px solid var(--border2); background:transparent; color:var(--text-dim);
            border-radius:1px; transition:all .2s;
        }
        .tab.active { border-color:var(--purple-dim); color:var(--purple); background:var(--purple-glow); }
        .tab-content { display:none; }
        .tab-content.active { display:block; }
        .admin-layout { display:grid; grid-template-columns:320px 1fr; gap:24px; align-items:start; }
        .panel { background:var(--surface); border:1px solid var(--border2); border-radius:2px; overflow:hidden; }
        .panel-head { padding:20px 24px; border-bottom:1px solid var(--border2); display:flex; align-items:center; justify-content:space-between; }
        .panel-title { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--text-dim); }
        .cl-list { max-height:calc(100vh - 300px); overflow-y:auto; }
        .cl-list-item { padding:14px 20px; border-bottom:1px solid var(--border2); cursor:pointer; display:flex; align-items:center; justify-content:space-between; gap:10px; transition:background .15s; }
        .cl-list-item:last-child { border-bottom:none; }
        .cl-list-item:hover { background:var(--purple-glow); }
        .cl-list-item.selected { background:var(--purple-glow); border-left:2px solid var(--purple); }
        .cli-title { font-family:'Cormorant Garamond',serif; font-size:17px; }
        .cli-meta { font-size:10px; color:var(--text-dim); margin-top:3px; }
        .cli-actions { display:flex; gap:6px; flex-shrink:0; }
        .detail-panel { background:var(--surface); border:1px solid var(--border2); border-radius:2px; position:relative; overflow:hidden; }
        .detail-panel::before { content:''; position:absolute; top:0;left:0;right:0; height:1px; background:linear-gradient(90deg,transparent,var(--purple-dim),transparent); }
        .detail-head { padding:22px 26px; border-bottom:1px solid var(--border2); display:flex; align-items:center; justify-content:space-between; gap:16px; }
        .detail-body { padding:22px 26px; }
        .task-admin-item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border2); cursor:default; }
        .task-admin-item:last-child { border-bottom:none; }
        .task-admin-item.dragging { opacity:.4; }
        .task-admin-item.drag-over { border-top:2px solid var(--purple); }
        .drag-handle { cursor:grab; color:var(--text-dim); font-size:14px; padding:0 4px; flex-shrink:0; user-select:none; }
        .drag-handle:active { cursor:grabbing; }
        .empty-detail { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px; color:var(--text-dim); }
        .empty-detail .icon { font-size:48px; opacity:.12; margin-bottom:16px; }
        .empty-detail p { font-size:12px; letter-spacing:.1em; }

        /* Папки */
        .cat-tree { display:flex; flex-direction:column; gap:8px; }
        .cat-node { background:var(--surface); border:1px solid var(--border2); border-radius:2px; overflow:hidden; }
        .cat-node-head { display:flex; align-items:center; gap:10px; padding:16px 18px; border-bottom:1px solid var(--border2); }
        .cat-node-name { font-family:'Cormorant Garamond',serif; font-size:19px; flex:1; }
        .cat-node-actions { display:flex; gap:6px; flex-shrink:0; }
        .cat-node-body { padding:12px 16px; display:flex; flex-direction:column; gap:8px; }
        .cat-children { display:flex; flex-direction:column; gap:6px; margin-left:16px; border-left:1px solid var(--border2); padding-left:12px; }
        .cat-child { background:var(--surface2); border:1px solid var(--border2); border-radius:2px; }
        .cat-child-head { display:flex; align-items:center; gap:8px; padding:12px 14px; border-bottom:1px solid var(--border2); }
        .cat-child-name { font-family:'Cormorant Garamond',serif; font-size:16px; flex:1; }
        .cat-child-body { padding:10px 14px; display:flex; flex-direction:column; gap:6px; }
        .cat-grandchildren { margin-left:12px; border-left:1px solid var(--border2); padding-left:10px; display:flex; flex-direction:column; gap:4px; }
        .cat-grandchild { background:var(--surface); border:1px solid var(--border2); border-radius:2px; padding:10px 12px; display:flex; align-items:center; gap:8px; }
        .cat-grandchild-name { font-size:13px; flex:1; color:var(--text-dim); }

        /* Чеклисты в папке */
        .cat-cls-list { display:flex; flex-direction:column; gap:4px; }
        .cat-cl-item { display:flex; align-items:center; justify-content:space-between; padding:6px 10px; background:var(--surface2); border-radius:1px; font-size:12px; gap:8px; }
        .assign-row { display:flex; gap:6px; }
        .assign-row select { flex:1; padding:7px 10px; font-size:12px; }

        @media(max-width:640px) {
            .admin-layout { grid-template-columns:1fr; }
            .cl-list { max-height:260px; }
            .detail-head { flex-direction:column; align-items:flex-start; gap:10px; }
            .detail-head .btn { width:100%; justify-content:center; }
            .tabs { flex-wrap:wrap; }
            .cat-node-head { flex-wrap:wrap; gap:8px; }
            .cat-node-actions { width:100%; justify-content:flex-end; }
            .cat-child-head { flex-wrap:wrap; }
            .assign-row { flex-direction:column; }
            .assign-row .btn { width:100%; justify-content:center; }
        }
    </style>
</head>
<body>
<canvas id="particles"></canvas>
<nav>
    <div class="nav-logo">Coffee Manager</div>
    <button class="burger" id="burger" onclick="toggleNav()"><span></span><span></span><span></span></button>
    <div class="nav-right" id="navRight">
        <div class="nav-links">
            <a href="checklists.html" class="nav-link">Чек-листы</a>
            <a href="archive.html" class="nav-link">Архив</a>
            <a href="admin.html" class="nav-link active">Админ</a>
        </div>
        <span class="nav-user" id="navUser"></span>
        <button class="btn-logout" onclick="logout()">Выйти</button>
    </div>
</nav>

<main class="wide">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px" class="anim">
        <div><h1 class="page-title">Админ панель</h1><div class="page-sub">Управление чек-листами</div></div>
    </div>
    <div class="tabs anim anim-1">
        <button class="tab active" onclick="switchTab('checklists')">Чек-листы</button>
        <button class="tab" onclick="switchTab('categories')">Папки</button>
    </div>

    <div class="tab-content active" id="tab-checklists">
        <div class="admin-layout">
            <div>
                <div class="panel">
                    <div class="panel-head">
                        <span class="panel-title">Чек-листы</span>
                        <button class="btn btn-primary btn-sm" onclick="openModal('createModal')">+ Новый</button>
                    </div>
                    <div class="cl-list" id="clList">
                        <div style="padding:24px;text-align:center;color:var(--text-dim);font-size:12px">Загрузка...</div>
                    </div>
                </div>
            </div>
            <div>
                <div class="detail-panel" id="detailPanel">
                    <div class="empty-detail"><div class="icon">←</div><p>Выберите чек-лист</p></div>
                </div>
            </div>
        </div>
    </div>

    <div class="tab-content" id="tab-categories">
        <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
            <button class="btn btn-primary btn-sm" onclick="openCreateCat(null)">+ Новая папка</button>
        </div>
        <div class="cat-tree" id="catTree">
            <div style="color:var(--text-dim);font-size:12px;padding:20px 0">Загрузка...</div>
        </div>
    </div>
</main>

<!-- Modals: чеклисты -->
<div class="modal-bg" id="createModal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('createModal')">✕</button>
        <div class="modal-title">Новый чек-лист</div>
        <div class="field"><label>Название</label><input id="newClTitle" type="text" placeholder="Открытие смены..."></div>
        <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('createModal')">Отмена</button><button class="btn btn-primary" onclick="createChecklist()">Создать</button></div>
    </div>
</div>
<div class="modal-bg" id="renameModal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('renameModal')">✕</button>
        <div class="modal-title">Переименовать</div>
        <div class="field"><label>Новое название</label><input id="renameInput" type="text"></div>
        <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('renameModal')">Отмена</button><button class="btn btn-primary" onclick="renameChecklist()">Сохранить</button></div>
    </div>
</div>
<div class="modal-bg" id="taskModal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('taskModal')">✕</button>
        <div class="modal-title">Новая задача</div>
        <div class="field"><label>Описание</label><textarea id="taskDesc" rows="3" placeholder="Описание задачи..."></textarea></div>
        <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('taskModal')">Отмена</button><button class="btn btn-primary" onclick="createTask()">Добавить</button></div>
    </div>
</div>

<!-- Modals: папки -->
<div class="modal-bg" id="createCatModal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('createCatModal')">✕</button>
        <div class="modal-title" id="createCatTitle">Новая папка</div>
        <div class="field"><label>Название</label><input id="newCatName" type="text" placeholder="Филиал 1..."></div>
        <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('createCatModal')">Отмена</button><button class="btn btn-primary" onclick="createCategory()">Создать</button></div>
    </div>
</div>
<div class="modal-bg" id="renameCatModal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('renameCatModal')">✕</button>
        <div class="modal-title">Переименовать папку</div>
        <div class="field"><label>Название</label><input id="renameCatInput" type="text"></div>
        <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('renameCatModal')">Отмена</button><button class="btn btn-primary" onclick="renameCat()">Сохранить</button></div>
    </div>
</div>

<div class="modal-bg" id="editTaskModal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('editTaskModal')">✕</button>
        <div class="modal-title">Редактировать задачу</div>
        <div class="field"><label>Описание</label><textarea id="editTaskDesc" rows="3"></textarea></div>
        <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal('editTaskModal')">Отмена</button><button class="btn btn-primary" onclick="saveEditTask()">Сохранить</button></div>
    </div>
</div>

<div class="toast" id="toast"></div>
<script src="api.js"></script>
<script>
    guardAuth('ADMIN');
    initParticles(0.3, 60);
    document.getElementById('navUser').textContent = getName();

    function toggleNav() {
        document.getElementById('navRight').classList.toggle('open');
        document.getElementById('burger').classList.toggle('open');
    }
    document.addEventListener('click', function(e) {
        const nav = document.getElementById('navRight');
        const burger = document.getElementById('burger');
        if (nav && burger && !nav.contains(e.target) && !burger.contains(e.target)) {
            nav.classList.remove('open');
            burger.classList.remove('open');
        }
    });

    function switchTab(name) {
        document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['checklists','categories'][i] === name));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
        if (name === 'categories') loadCategories();
    }

    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
    document.querySelectorAll('.modal-bg').forEach(m => m.addEventListener('click', e => { if(e.target===e.currentTarget) m.classList.remove('open'); }));

    // ── Checklists ──────────────────────────────────────────
    let checklists = [], selectedCl = null, renamingId = null;

    async function loadChecklists() {
        const data = await api.get('/api/checklists');
        if (!data) return;
        checklists = data;
        renderClList();
        if (selectedCl) {
            const updated = checklists.find(c => c.id === selectedCl.id);
            if (updated) selectChecklist(updated);
        }
    }

    function renderClList() {
        const el = document.getElementById('clList');
        if (!checklists.length) { el.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-dim);font-size:12px">Чек-листов нет</div>'; return; }
        el.innerHTML = checklists.map((cl, i) => {
            const total = cl.tasks?.length || 0;
            const done  = cl.tasks?.filter(t=>t.completed).length || 0;
            const sel   = selectedCl?.id === cl.id ? ' selected' : '';
            return '<div class="cl-list-item' + sel + '" onclick="selectChecklist(checklists[' + i + '])">' +
                '<div><div class="cli-title">' + escHtml(cl.title) + '</div><div class="cli-meta">' + done + '/' + total + ' задач</div></div>' +
                '<div class="cli-actions" onclick="event.stopPropagation()">' +
                '<button class="btn btn-ghost btn-sm" onclick="openRename(' + cl.id + ',\'' + escHtml(cl.title).replace(/'/g,"\\'") + '\')">✎</button>' +
                '<button class="btn btn-danger btn-sm" onclick="deleteChecklist(' + cl.id + ')">✕</button>' +
                '</div></div>';
        }).join('');
    }

    function selectChecklist(cl) { selectedCl = cl; renderClList(); renderDetail(); }

    function renderDetail() {
        const cl = selectedCl;
        const tasks = cl.tasks || [];
        const done = tasks.filter(t=>t.completed).length;
        const pct  = tasks.length ? Math.round(done/tasks.length*100) : 0;
        document.getElementById('detailPanel').innerHTML =
            '<div class="detail-head"><div style="flex:1">' +
            '<div style="font-family:\'Cormorant Garamond\',serif;font-size:24px;font-weight:300">' + escHtml(cl.title) + '</div>' +
            '<div style="font-size:11px;color:var(--text-dim);margin-top:4px">' + done + ' из ' + tasks.length + ' задач • ' + pct + '%</div>' +
            '<div class="progress-bar" style="margin-top:10px;max-width:300px"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
            '</div><button class="btn btn-primary btn-sm" onclick="openModal(\'taskModal\')">+ Задача</button></div>' +
            '<div class="detail-body">' +
            (tasks.length ? '<div id="taskDndList">' + tasks.map(t =>
                '<div class="task-admin-item" data-id="' + t.id + '" draggable="true">' +
                '<span class="drag-handle" title="Перетащить">⠿</span>' +
                '<div class="task-check' + (t.completed?' checked':'') + '" onclick="toggleTask(' + t.id + ')" style="cursor:pointer"></div>' +
                '<div class="task-admin-desc' + (t.completed?' done':'') + '">' + escHtml(t.description) + '</div>' +
                '<div style="display:flex;gap:4px">' +
                '<button class="btn btn-ghost btn-sm" onclick="openEditTask(' + t.id + ',\'' + escHtml(t.description).replace(/'/g,"\\'").replace(/\n/g,' ') + '\')">✎</button>' +
                '<button class="btn btn-danger btn-sm" onclick="deleteTask(' + t.id + ')">✕</button></div></div>'
            ).join('') + '</div>' : '<div class="empty"><p>Задач нет</p></div>') + '</div>';
        // Инициализируем drag-and-drop после рендера
        setTimeout(initDnd, 0);
    }

    async function createChecklist() {
        const title = document.getElementById('newClTitle').value.trim();
        if (!title) return;
        const res = await api.post('/api/checklists', { title });
        if (res.ok) { closeModal('createModal'); showToast('Чек-лист создан'); loadChecklists(); }
        else showToast('Ошибка', 'err');
    }
    function openRename(id, t) { renamingId = id; document.getElementById('renameInput').value = t; openModal('renameModal'); }
    async function renameChecklist() {
        const title = document.getElementById('renameInput').value.trim();
        if (!title || !renamingId) return;
        const res = await api.put('/api/checklists/' + renamingId, { title });
        if (res.ok) { closeModal('renameModal'); showToast('Переименовано'); loadChecklists(); }
        else showToast('Ошибка', 'err');
    }
    async function deleteChecklist(id) {
        if (!confirm('Удалить чек-лист?')) return;
        const res = await api.delete('/api/checklists/' + id);
        if (res.ok) {
            showToast('Удалено');
            if (selectedCl?.id === id) { selectedCl = null; document.getElementById('detailPanel').innerHTML = '<div class="empty-detail"><div class="icon">←</div><p>Выберите чек-лист</p></div>'; }
            loadChecklists();
        } else showToast('Ошибка', 'err');
    }
    async function createTask() {
        const desc = document.getElementById('taskDesc').value.trim();
        if (!desc || !selectedCl) return;
        const res = await api.post('/api/checklists/' + selectedCl.id + '/tasks', { description: desc, sortOrder: 0 });
        if (res.ok) { closeModal('taskModal'); document.getElementById('taskDesc').value=''; showToast('Задача добавлена'); loadChecklists(); }
        else showToast('Ошибка', 'err');
    }
    let editingTaskId = null;
    function openEditTask(taskId, desc) {
        editingTaskId = taskId;
        document.getElementById('editTaskDesc').value = desc;
        openModal('editTaskModal');
        setTimeout(() => document.getElementById('editTaskDesc').focus(), 100);
    }
    async function saveEditTask() {
        const desc = document.getElementById('editTaskDesc').value.trim();
        if (!desc || !editingTaskId || !selectedCl) return;
        const res = await api.put('/api/checklists/' + selectedCl.id + '/tasks/' + editingTaskId, { description: desc, completed: false });
        if (res.ok) { closeModal('editTaskModal'); showToast('Задача обновлена'); loadChecklists(); }
        else showToast('Ошибка', 'err');
    }
    async function toggleTask(taskId) {
        const res = await api.patch('/api/checklists/' + selectedCl.id + '/tasks/' + taskId + '/toggle');
        if (res.ok) loadChecklists(); else showToast('Ошибка', 'err');
    }
    async function deleteTask(taskId) {
        if (!confirm('Удалить задачу?')) return;
        const res = await api.delete('/api/checklists/' + selectedCl.id + '/tasks/' + taskId);
        if (res.ok) { showToast('Задача удалена'); loadChecklists(); } else showToast('Ошибка', 'err');
    }

    // ── Drag and Drop ──────────────────────────────────────────
    let dragSrc = null;
    function initDnd() {
        const list = document.getElementById('taskDndList');
        if (!list) return;
        const items = list.querySelectorAll('.task-admin-item');

        items.forEach(item => {
            // ── Desktop drag ──────────────────────────
            item.addEventListener('dragstart', function(e) {
                dragSrc = this;
                this.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            });
            item.addEventListener('dragend', function() {
                this.classList.remove('dragging');
                list.querySelectorAll('.task-admin-item').forEach(i => i.classList.remove('drag-over'));
                saveOrder();
            });
            item.addEventListener('dragover', function(e) {
                e.preventDefault();
                list.querySelectorAll('.task-admin-item').forEach(i => i.classList.remove('drag-over'));
                if (this !== dragSrc) this.classList.add('drag-over');
            });
            item.addEventListener('drop', function(e) {
                e.preventDefault();
                if (dragSrc && this !== dragSrc) {
                    const all = [...list.querySelectorAll('.task-admin-item')];
                    if (all.indexOf(dragSrc) < all.indexOf(this)) this.after(dragSrc);
                    else this.before(dragSrc);
                }
            });

            // ── Touch drag ────────────────────────────
            let touchClone = null, touchOffX = 0, touchOffY = 0;

            item.addEventListener('touchstart', function(e) {
                dragSrc = this;
                const touch = e.touches[0];
                const rect = this.getBoundingClientRect();
                touchOffX = touch.clientX - rect.left;
                touchOffY = touch.clientY - rect.top;

                // Создаём визуальный клон
                touchClone = this.cloneNode(true);
                touchClone.style.cssText = 'position:fixed;z-index:9999;pointer-events:none;opacity:0.85;' +
                    'background:#16161f;border:1px solid rgba(157,95,255,0.4);border-radius:2px;' +
                    'width:' + rect.width + 'px;padding:12px 14px;';
                touchClone.style.left = (touch.clientX - touchOffX) + 'px';
                touchClone.style.top  = (touch.clientY - touchOffY) + 'px';
                document.body.appendChild(touchClone);
                this.classList.add('dragging');
            }, { passive: true });

            item.addEventListener('touchmove', function(e) {
                e.preventDefault();
                const touch = e.touches[0];
                if (touchClone) {
                    touchClone.style.left = (touch.clientX - touchOffX) + 'px';
                    touchClone.style.top  = (touch.clientY - touchOffY) + 'px';
                }
                // Подсвечиваем элемент под пальцем
                list.querySelectorAll('.task-admin-item').forEach(i => i.classList.remove('drag-over'));
                const el = document.elementFromPoint(touch.clientX, touch.clientY);
                const target = el ? el.closest('.task-admin-item') : null;
                if (target && target !== dragSrc) target.classList.add('drag-over');
            }, { passive: false });

            item.addEventListener('touchend', function(e) {
                if (touchClone) { touchClone.remove(); touchClone = null; }
                this.classList.remove('dragging');
                list.querySelectorAll('.task-admin-item').forEach(i => i.classList.remove('drag-over'));

                const touch = e.changedTouches[0];
                const el = document.elementFromPoint(touch.clientX, touch.clientY);
                const target = el ? el.closest('.task-admin-item') : null;
                if (target && target !== dragSrc) {
                    const all = [...list.querySelectorAll('.task-admin-item')];
                    if (all.indexOf(dragSrc) < all.indexOf(target)) target.after(dragSrc);
                    else target.before(dragSrc);
                }
                saveOrder();
            });
        });
    }

    async function saveOrder() {
        const list = document.getElementById('taskDndList');
        if (!list || !selectedCl) return;
        const ids = [...list.querySelectorAll('.task-admin-item')].map(el => parseInt(el.dataset.id));
        await api.patch('/api/checklists/' + selectedCl.id + '/tasks/reorder', ids);
    }

    // ── Categories ──────────────────────────────────────────
    let categories = [], renamingCatId = null, creatingParentId = null;

    async function loadCategories() {
        const data = await api.get('/api/categories');
        if (!data) return;
        categories = data;
        renderCatTree();
    }

    function collectAllIds(cats) {
        let ids = [];
        cats.forEach(c => {
            (c.checklists || []).forEach(cl => ids.push(cl.id));
            if (c.children) ids = ids.concat(collectAllIds(c.children));
        });
        return ids;
    }

    function clsInCat(cat) {
        const allCatIds = new Set(collectAllIds(categories));
        return checklists.filter(cl => !allCatIds.has(cl.id));
    }

    function renderClsInCat(cat) {
        const cls = cat.checklists || [];
        let html = '';
        if (cls.length) {
            html += '<div class="cat-cls-list">' + cls.map(cl =>
                '<div class="cat-cl-item"><span>' + escHtml(cl.title) + '</span>' +
                '<button class="btn btn-danger btn-sm" onclick="removeFromCat(' + cl.id + ')" style="padding:3px 8px;font-size:9px">✕</button></div>'
            ).join('') + '</div>';
        }
        // Доступные чеклисты для добавления
        const allCatIds = new Set(collectAllIds(categories));
        const available = checklists.filter(cl => !allCatIds.has(cl.id));
        if (available.length) {
            html += '<div class="assign-row" style="margin-top:8px">' +
                '<select id="assign-' + cat.id + '"><option value="">+ Добавить чек-лист</option>' +
                available.map(c => '<option value="' + c.id + '">' + escHtml(c.title) + '</option>').join('') +
                '</select><button class="btn btn-ghost btn-sm" onclick="assignToCat(' + cat.id + ')">Добавить</button></div>';
        }
        return html;
    }

    function renderCatTree() {
        const tree = document.getElementById('catTree');
        if (!categories.length) {
            tree.innerHTML = '<div class="empty"><span class="icon">📁</span><p>Папок нет</p></div>';
            return;
        }
        tree.innerHTML = categories.map(cat => {
            const children = cat.children || [];
            return '<div class="cat-node">' +
                '<div class="cat-node-head">' +
                '<span class="cat-node-name">📁 ' + escHtml(cat.name) + '</span>' +
                '<div class="cat-node-actions">' +
                '<button class="btn btn-ghost btn-sm" onclick="openCreateCat(' + cat.id + ')">+ Подпапка</button>' +
                '<button class="btn btn-ghost btn-sm" onclick="openRenameCat(' + cat.id + ',\'' + escHtml(cat.name).replace(/'/g,"\\'") + '\')">✎</button>' +
                '<button class="btn btn-danger btn-sm" onclick="deleteCategory(' + cat.id + ')">✕</button>' +
                '</div></div>' +
                '<div class="cat-node-body">' +
                renderClsInCat(cat) +
                (children.length ? '<div class="cat-children">' + children.map(child => {
                    const grandchildren = child.children || [];
                    return '<div class="cat-child">' +
                        '<div class="cat-child-head">' +
                        '<span class="cat-child-name">📂 ' + escHtml(child.name) + '</span>' +
                        '<div style="display:flex;gap:4px">' +
                        '<button class="btn btn-ghost btn-sm" onclick="openCreateCat(' + child.id + ')">+ Подпапка</button>' +
                        '<button class="btn btn-ghost btn-sm" onclick="openRenameCat(' + child.id + ',\'' + escHtml(child.name).replace(/'/g,"\\'") + '\')">✎</button>' +
                        '<button class="btn btn-danger btn-sm" onclick="deleteCategory(' + child.id + ')">✕</button>' +
                        '</div></div>' +
                        '<div class="cat-child-body">' +
                        renderClsInCat(child) +
                        (grandchildren.length ? '<div class="cat-grandchildren">' + grandchildren.map(gc =>
                            '<div class="cat-grandchild">' +
                            '<span class="cat-grandchild-name">📄 ' + escHtml(gc.name) + '</span>' +
                            '<div style="display:flex;gap:4px">' +
                            '<button class="btn btn-ghost btn-sm" onclick="openRenameCat(' + gc.id + ',\'' + escHtml(gc.name).replace(/'/g,"\\'") + '\')">✎</button>' +
                            '<button class="btn btn-danger btn-sm" onclick="deleteCategory(' + gc.id + ')">✕</button>' +
                            '</div></div>' +
                            renderClsInCat(gc)
                        ).join('') + '</div>' : '') +
                        '</div></div>';
                }).join('') + '</div>' : '') +
                '</div></div>';
        }).join('');
    }

    function openCreateCat(parentId) {
        creatingParentId = parentId;
        document.getElementById('createCatTitle').textContent = parentId ? 'Новая подпапка' : 'Новая папка';
        document.getElementById('newCatName').value = '';
        openModal('createCatModal');
        setTimeout(() => document.getElementById('newCatName').focus(), 100);
    }
    async function createCategory() {
        const name = document.getElementById('newCatName').value.trim();
        if (!name) return;
        const body = creatingParentId ? { name, parentId: creatingParentId } : { name };
        const res = await api.post('/api/categories', body);
        if (res.ok) { closeModal('createCatModal'); showToast('Папка создана'); loadCategories(); }
        else showToast('Ошибка', 'err');
    }
    function openRenameCat(id, name) {
        renamingCatId = id;
        document.getElementById('renameCatInput').value = name;
        openModal('renameCatModal');
        setTimeout(() => document.getElementById('renameCatInput').focus(), 100);
    }
    async function renameCat() {
        const name = document.getElementById('renameCatInput').value.trim();
        if (!name || !renamingCatId) return;
        const res = await api.put('/api/categories/' + renamingCatId, { name });
        if (res.ok) { closeModal('renameCatModal'); showToast('Переименовано'); loadCategories(); }
        else showToast('Ошибка', 'err');
    }
    async function deleteCategory(id) {
        if (!confirm('Удалить папку? Чек-листы и подпапки останутся.')) return;
        const res = await api.delete('/api/categories/' + id);
        if (res.ok) { showToast('Папка удалена'); loadCategories(); }
        else showToast('Ошибка', 'err');
    }
    async function assignToCat(catId) {
        const sel = document.getElementById('assign-' + catId);
        const clId = sel.value;
        if (!clId) return;
        const res = await api.post('/api/categories/' + catId + '/checklists/' + clId, {});
        if (res.ok) { showToast('Добавлено'); loadCategories(); loadChecklists(); }
        else showToast('Ошибка', 'err');
    }
    async function removeFromCat(clId) {
        const res = await fetch(API + '/api/checklists/' + clId + '/category', { method:'DELETE', headers: authHeaders() });
        if (res.ok) { showToast('Убрано из папки'); loadCategories(); loadChecklists(); }
        else showToast('Ошибка', 'err');
    }

    document.getElementById('newClTitle').addEventListener('keydown', e => e.key==='Enter' && createChecklist());
    document.getElementById('renameInput').addEventListener('keydown', e => e.key==='Enter' && renameChecklist());
    document.getElementById('newCatName').addEventListener('keydown', e => e.key==='Enter' && createCategory());
    document.getElementById('renameCatInput').addEventListener('keydown', e => e.key==='Enter' && renameCat());

    loadChecklists();
</script>
</body>
</html>
