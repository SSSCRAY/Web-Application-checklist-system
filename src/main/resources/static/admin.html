<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панель — Coffee Manager</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .tabs { display:flex; gap:2px; margin-bottom:28px; }
        .tab {
            padding:9px 20px; font-family:'DM Mono',monospace; font-size:11px;
            letter-spacing:.12em; text-transform:uppercase; cursor:pointer;
            border:1px solid var(--border2); background:transparent; color:var(--text-dim);
            border-radius:1px; transition:all .2s;
        }
        .tab.active { border-color:var(--purple-dim); color:var(--purple); background:var(--purple-glow); }
        .tab-content { display:none; }
        .tab-content.active { display:block; }

        /* Checklists tab */
        .admin-layout { display:grid; grid-template-columns:320px 1fr; gap:24px; align-items:start; }
        .panel { background:var(--surface); border:1px solid var(--border2); border-radius:2px; overflow:hidden; }
        .panel-head { padding:20px 24px; border-bottom:1px solid var(--border2); display:flex; align-items:center; justify-content:space-between; }
        .panel-title { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--text-dim); }
        .cl-list { max-height:calc(100vh - 300px); overflow-y:auto; }
        .cl-list-item { padding:16px 24px; border-bottom:1px solid var(--border2); cursor:pointer; display:flex; align-items:center; justify-content:space-between; gap:12px; transition:background .15s; }
        .cl-list-item:last-child { border-bottom:none; }
        .cl-list-item:hover { background:var(--purple-glow); }
        .cl-list-item.selected { background:var(--purple-glow); border-left:2px solid var(--purple); }
        .cli-title { font-family:'Cormorant Garamond',serif; font-size:17px; }
        .cli-meta { font-size:10px; color:var(--text-dim); margin-top:3px; }
        .cli-actions { display:flex; gap:6px; flex-shrink:0; }
        .detail-panel { background:var(--surface); border:1px solid var(--border2); border-radius:2px; position:relative; overflow:hidden; }
        .detail-panel::before { content:''; position:absolute; top:0;left:0;right:0; height:1px; background:linear-gradient(90deg,transparent,var(--purple-dim),transparent); }
        .detail-head { padding:24px 28px; border-bottom:1px solid var(--border2); display:flex; align-items:center; justify-content:space-between; gap:16px; }
        .detail-body { padding:24px 28px; }
        .task-admin-item { display:flex; align-items:center; gap:12px; padding:14px 0; border-bottom:1px solid var(--border2); }
        .task-admin-item:last-child { border-bottom:none; }
        .task-admin-desc { flex:1; font-size:13px; }
        .task-admin-desc.done { color:var(--text-dim); }
        .empty-detail { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px; color:var(--text-dim); }
        .empty-detail .icon { font-size:48px; opacity:.12; margin-bottom:16px; }
        .empty-detail p { font-size:12px; letter-spacing:.1em; }

        /* Categories tab */
        .cat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
        .cat-card { background:var(--surface); border:1px solid var(--border2); border-radius:2px; padding:22px 24px; position:relative; overflow:hidden; }
        .cat-card::before { content:''; position:absolute; top:0;left:0;right:0; height:1px; background:linear-gradient(90deg,transparent,var(--purple-dim),transparent); }
        .cat-card-title { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:400; margin-bottom:6px; }
        .cat-card-meta { font-size:10px; color:var(--text-dim); letter-spacing:.07em; margin-bottom:16px; }
        .cat-card-actions { display:flex; gap:8px; }

        /* Assign select */
        .assign-row { display:flex; gap:8px; margin-top:16px; padding-top:16px; border-top:1px solid var(--border2); }
        .assign-row select { flex:1; padding:8px 12px; font-size:12px; }

        @media(max-width:640px) {
            .admin-layout { grid-template-columns:1fr; }
            .cl-list { max-height:280px; }
            .detail-head { flex-direction:column; align-items:flex-start; gap:12px; }
            .cat-grid { grid-template-columns:1fr; }
            .tabs { flex-wrap:wrap; }
        }
    </style>
</head>
<body>
<canvas id="particles"></canvas>
<nav>
    <div class="nav-logo">Coffee Manager</div>
    <button class="burger" id="burger" onclick="toggleNav()"><span></span><span></span><span></span></button>
    <div class="nav-right" id="navRight">
        <div class="nav-links">
            <a href="checklists.html" class="nav-link">Чек-листы</a>
            <a href="archive.html" class="nav-link">Архив</a>
            <a href="admin.html" class="nav-link active">Админ</a>
        </div>
        <span class="nav-user" id="navUser"></span>
        <button class="btn-logout" onclick="logout()">Выйти</button>
    </div>
</nav>

<main class="wide">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px" class="anim">
        <div><h1 class="page-title">Админ панель</h1><div class="page-sub">Управление чек-листами</div></div>
    </div>

    <!-- Табы -->
    <div class="tabs anim anim-1">
        <button class="tab active" onclick="switchTab('checklists')">Чек-листы</button>
        <button class="tab" onclick="switchTab('categories')">Папки</button>
    </div>

    <!-- Таб: Чек-листы -->
    <div class="tab-content active" id="tab-checklists">
        <div class="admin-layout">
            <div>
                <div class="panel">
                    <div class="panel-head">
                        <span class="panel-title">Чек-листы</span>
                        <button class="btn btn-primary btn-sm" onclick="openModal('createModal')">+ Новый</button>
                    </div>
                    <div class="cl-list" id="clList">
                        <div style="padding:24px;text-align:center;color:var(--text-dim);font-size:12px">Загрузка...</div>
                    </div>
                </div>
            </div>
            <div>
                <div class="detail-panel" id="detailPanel">
                    <div class="empty-detail"><div class="icon">←</div><p>Выберите чек-лист</p></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Таб: Папки -->
    <div class="tab-content" id="tab-categories">
        <div style="display:flex;justify-content:flex-end;margin-bottom:20px">
            <button class="btn btn-primary btn-sm" onclick="openModal('createCatModal')">+ Новая папка</button>
        </div>
        <div class="cat-grid" id="catGrid">
            <div style="color:var(--text-dim);font-size:12px">Загрузка...</div>
        </div>
    </div>
</main>

<!-- Modal: создать чеклист -->
<div class="modal-bg" id="createModal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('createModal')">✕</button>
        <div class="modal-title">Новый чек-лист</div>
        <div class="field"><label>Название</label><input id="newClTitle" type="text" placeholder="Открытие смены..."></div>
        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeModal('createModal')">Отмена</button>
            <button class="btn btn-primary" onclick="createChecklist()">Создать</button>
        </div>
    </div>
</div>

<!-- Modal: переименовать чеклист -->
<div class="modal-bg" id="renameModal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('renameModal')">✕</button>
        <div class="modal-title">Переименовать</div>
        <div class="field"><label>Новое название</label><input id="renameInput" type="text"></div>
        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeModal('renameModal')">Отмена</button>
            <button class="btn btn-primary" onclick="renameChecklist()">Сохранить</button>
        </div>
    </div>
</div>

<!-- Modal: добавить задачу -->
<div class="modal-bg" id="taskModal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('taskModal')">✕</button>
        <div class="modal-title">Новая задача</div>
        <div class="field"><label>Описание</label><textarea id="taskDesc" rows="3" placeholder="Описание задачи..."></textarea></div>
        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeModal('taskModal')">Отмена</button>
            <button class="btn btn-primary" onclick="createTask()">Добавить</button>
        </div>
    </div>
</div>

<!-- Modal: создать папку -->
<div class="modal-bg" id="createCatModal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('createCatModal')">✕</button>
        <div class="modal-title">Новая папка</div>
        <div class="field"><label>Название</label><input id="newCatName" type="text" placeholder="Филиал 1..."></div>
        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeModal('createCatModal')">Отмена</button>
            <button class="btn btn-primary" onclick="createCategory()">Создать</button>
        </div>
    </div>
</div>

<!-- Modal: переименовать папку -->
<div class="modal-bg" id="renameCatModal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('renameCatModal')">✕</button>
        <div class="modal-title">Переименовать папку</div>
        <div class="field"><label>Название</label><input id="renameCatInput" type="text"></div>
        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeModal('renameCatModal')">Отмена</button>
            <button class="btn btn-primary" onclick="renameCat()">Сохранить</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>
<script src="api.js"></script>
<script>
    guardAuth('ADMIN');
    initParticles(0.3, 60);
    document.getElementById('navUser').textContent = getName();

    function toggleNav() {
        document.getElementById('navRight').classList.toggle('open');
        document.getElementById('burger').classList.toggle('open');
    }
    document.addEventListener('click', function(e) {
        const nav = document.getElementById('navRight');
        const burger = document.getElementById('burger');
        if (nav && burger && !nav.contains(e.target) && !burger.contains(e.target)) {
            nav.classList.remove('open');
            burger.classList.remove('open');
        }
    });

    // ── Табы ──────────────────────────────────────────────
    function switchTab(name) {
        document.querySelectorAll('.tab').forEach((t,i) => {
            t.classList.toggle('active', ['checklists','categories'][i] === name);
        });
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
        if (name === 'categories') loadCategories();
    }

    // ── Modals ──────────────────────────────────────────────
    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
    document.querySelectorAll('.modal-bg').forEach(m => m.addEventListener('click', e => { if(e.target===e.currentTarget) m.classList.remove('open'); }));

    // ── Checklists ──────────────────────────────────────────
    let checklists = [], selectedCl = null, renamingId = null;

    async function loadChecklists() {
        const data = await api.get('/api/checklists');
        if (!data) return;
        checklists = data;
        renderClList();
        if (selectedCl) {
            const updated = checklists.find(c => c.id === selectedCl.id);
            if (updated) selectChecklist(updated);
        }
    }

    function renderClList() {
        const el = document.getElementById('clList');
        if (!checklists.length) {
            el.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text-dim);font-size:12px">Чек-листов нет</div>';
            return;
        }
        el.innerHTML = checklists.map((cl, i) => {
            const total = cl.tasks?.length || 0;
            const done  = cl.tasks?.filter(t=>t.completed).length || 0;
            const sel   = selectedCl?.id === cl.id ? ' selected' : '';
            return '<div class="cl-list-item' + sel + '" onclick="selectChecklist(checklists[' + i + '])">' +
                '<div><div class="cli-title">' + escHtml(cl.title) + '</div><div class="cli-meta">' + done + '/' + total + ' задач</div></div>' +
                '<div class="cli-actions" onclick="event.stopPropagation()">' +
                '<button class="btn btn-ghost btn-sm" onclick="openRename(' + cl.id + ',\'' + escHtml(cl.title).replace(/'/g,"\\'") + '\')">✎</button>' +
                '<button class="btn btn-danger btn-sm" onclick="deleteChecklist(' + cl.id + ')">✕</button>' +
                '</div></div>';
        }).join('');
    }

    function selectChecklist(cl) { selectedCl = cl; renderClList(); renderDetail(); }

    function renderDetail() {
        const cl = selectedCl;
        const tasks = cl.tasks || [];
        const done  = tasks.filter(t=>t.completed).length;
        const pct   = tasks.length ? Math.round(done/tasks.length*100) : 0;
        document.getElementById('detailPanel').innerHTML =
            '<div class="detail-head">' +
            '<div style="flex:1">' +
            '<div style="font-family:\'Cormorant Garamond\',serif;font-size:26px;font-weight:300">' + escHtml(cl.title) + '</div>' +
            '<div style="font-size:11px;color:var(--text-dim);margin-top:4px">' + done + ' из ' + tasks.length + ' задач • ' + pct + '%</div>' +
            '<div class="progress-bar" style="margin-top:10px;max-width:300px"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
            '</div>' +
            '<button class="btn btn-primary btn-sm" onclick="openModal(\'taskModal\')">+ Задача</button>' +
            '</div>' +
            '<div class="detail-body">' +
            (tasks.length ? tasks.map(t =>
                '<div class="task-admin-item">' +
                '<div class="task-check' + (t.completed?' checked':'') + '" onclick="toggleTask(' + t.id + ')" style="cursor:pointer"></div>' +
                '<div class="task-admin-desc' + (t.completed?' done':'') + '">' + escHtml(t.description) + '</div>' +
                '<div style="display:flex;gap:6px"><button class="btn btn-danger btn-sm" onclick="deleteTask(' + t.id + ')">✕</button></div>' +
                '</div>'
            ).join('') : '<div class="empty"><p>Задач нет</p></div>') +
            '</div>';
    }

    function openCreateModal() { document.getElementById('newClTitle').value = ''; openModal('createModal'); setTimeout(() => document.getElementById('newClTitle').focus(), 100); }
    async function createChecklist() {
        const title = document.getElementById('newClTitle').value.trim();
        if (!title) return;
        const res = await api.post('/api/checklists', { title });
        if (res.ok) { closeModal('createModal'); showToast('Чек-лист создан'); loadChecklists(); }
        else showToast('Ошибка', 'err');
    }
    function openRename(id, t) { renamingId = id; document.getElementById('renameInput').value = t; openModal('renameModal'); setTimeout(() => document.getElementById('renameInput').focus(), 100); }
    async function renameChecklist() {
        const title = document.getElementById('renameInput').value.trim();
        if (!title || !renamingId) return;
        const res = await api.put('/api/checklists/' + renamingId, { title });
        if (res.ok) { closeModal('renameModal'); showToast('Переименовано'); loadChecklists(); }
        else showToast('Ошибка', 'err');
    }
    async function deleteChecklist(id) {
        if (!confirm('Удалить чек-лист?')) return;
        const res = await api.delete('/api/checklists/' + id);
        if (res.ok) {
            showToast('Удалено');
            if (selectedCl?.id === id) { selectedCl = null; document.getElementById('detailPanel').innerHTML = '<div class="empty-detail"><div class="icon">←</div><p>Выберите чек-лист</p></div>'; }
            loadChecklists();
        } else showToast('Ошибка', 'err');
    }
    async function createTask() {
        const desc = document.getElementById('taskDesc').value.trim();
        if (!desc || !selectedCl) return;
        const res = await api.post('/api/checklists/' + selectedCl.id + '/tasks', { description: desc, sortOrder: 0 });
        if (res.ok) { closeModal('taskModal'); document.getElementById('taskDesc').value=''; showToast('Задача добавлена'); loadChecklists(); }
        else showToast('Ошибка', 'err');
    }
    async function toggleTask(taskId) {
        const res = await api.patch('/api/checklists/' + selectedCl.id + '/tasks/' + taskId + '/toggle');
        if (res.ok) loadChecklists(); else showToast('Ошибка', 'err');
    }
    async function deleteTask(taskId) {
        if (!confirm('Удалить задачу?')) return;
        const res = await api.delete('/api/checklists/' + selectedCl.id + '/tasks/' + taskId);
        if (res.ok) { showToast('Задача удалена'); loadChecklists(); } else showToast('Ошибка', 'err');
    }

    // ── Categories ──────────────────────────────────────────
    let categories = [], renamingCatId = null;

    async function loadCategories() {
        const data = await api.get('/api/categories');
        if (!data) return;
        categories = data;
        renderCategories();
    }

    function renderCategories() {
        const grid = document.getElementById('catGrid');
        if (!categories.length) {
            grid.innerHTML = '<div class="empty"><span class="icon">📁</span><p>Папок нет</p></div>';
            return;
        }
        const allCls = checklists;
        grid.innerHTML = categories.map((cat, ci) => {
            const cls = cat.checklists || [];
            // Чек-листы не в этой папке (для assign)
            const catClIds = new Set(cls.map(c => c.id));
            const available = allCls.filter(c => !catClIds.has(c.id));
            return '<div class="cat-card anim" style="animation-delay:' + (ci*.06) + 's">' +
                '<div class="cat-card-title">' + escHtml(cat.name) + '</div>' +
                '<div class="cat-card-meta">' + cls.length + ' чек-листов</div>' +
                // список чеклистов в папке
                (cls.length ? cls.map(cl => '<div style="font-size:12px;padding:5px 0;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between">' +
                    '<span>' + escHtml(cl.title) + '</span>' +
                    '<button class="btn btn-danger btn-sm" onclick="removeFromCat(' + cl.id + ')" style="padding:3px 8px;font-size:9px">✕</button>' +
                    '</div>').join('') : '') +
                // добавить чеклист в папку
                (available.length ? '<div class="assign-row">' +
                    '<select id="assign-' + cat.id + '"><option value="">+ Добавить чек-лист</option>' +
                    available.map(c => '<option value="' + c.id + '">' + escHtml(c.title) + '</option>').join('') +
                    '</select>' +
                    '<button class="btn btn-ghost btn-sm" onclick="assignToCat(' + cat.id + ')">Добавить</button>' +
                    '</div>' : '') +
                '<div class="cat-card-actions" style="margin-top:14px">' +
                '<button class="btn btn-ghost btn-sm" onclick="openRenameCat(' + cat.id + ',\'' + escHtml(cat.name).replace(/'/g,"\\'") + '\')">✎ Переименовать</button>' +
                '<button class="btn btn-danger btn-sm" onclick="deleteCategory(' + cat.id + ')">Удалить</button>' +
                '</div></div>';
        }).join('');
    }

    async function createCategory() {
        const name = document.getElementById('newCatName').value.trim();
        if (!name) return;
        const res = await api.post('/api/categories', { name });
        if (res.ok) { closeModal('createCatModal'); document.getElementById('newCatName').value=''; showToast('Папка создана'); loadCategories(); }
        else showToast('Ошибка', 'err');
    }

    function openRenameCat(id, name) {
        renamingCatId = id;
        document.getElementById('renameCatInput').value = name;
        openModal('renameCatModal');
        setTimeout(() => document.getElementById('renameCatInput').focus(), 100);
    }
    async function renameCat() {
        const name = document.getElementById('renameCatInput').value.trim();
        if (!name || !renamingCatId) return;
        const res = await api.put('/api/categories/' + renamingCatId, { name });
        if (res.ok) { closeModal('renameCatModal'); showToast('Переименовано'); loadCategories(); }
        else showToast('Ошибка', 'err');
    }
    async function deleteCategory(id) {
        if (!confirm('Удалить папку? Чек-листы останутся.')) return;
        const res = await api.delete('/api/categories/' + id);
        if (res.ok) { showToast('Папка удалена'); loadCategories(); }
        else showToast('Ошибка', 'err');
    }
    async function assignToCat(catId) {
        const sel = document.getElementById('assign-' + catId);
        const clId = sel.value;
        if (!clId) return;
        const res = await api.post('/api/categories/' + catId + '/checklists/' + clId, {});
        if (res.ok) { showToast('Добавлено'); loadCategories(); loadChecklists(); }
        else showToast('Ошибка', 'err');
    }
    async function removeFromCat(clId) {
        // Убираем категорию — назначаем null через отдельный endpoint или через PUT checklist
        const res = await fetch(API + '/api/checklists/' + clId + '/category', { method:'DELETE', headers: authHeaders() });
        if (res.ok) { showToast('Убрано из папки'); loadCategories(); loadChecklists(); }
        else showToast('Ошибка', 'err');
    }

    document.getElementById('newClTitle').addEventListener('keydown', e => e.key==='Enter' && createChecklist());
    document.getElementById('renameInput').addEventListener('keydown', e => e.key==='Enter' && renameChecklist());
    document.getElementById('newCatName').addEventListener('keydown', e => e.key==='Enter' && createCategory());
    document.getElementById('renameCatInput').addEventListener('keydown', e => e.key==='Enter' && renameCat());

    loadChecklists();
</script>
</body>
</html>
